name: Publish to PyPI

# Triggers:
# - tag push matching `v*` (real release; canonical path for 0.7.0+)
# - manual workflow_dispatch with placeholder=true (one-time 0.0.0 reservation)
#
# Trusted Publishing is auto-promoted from Pending -> Active on first
# successful publish. Future runs use OIDC; no API tokens are stored.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      placeholder:
        description: 'Build & publish a 0.0.0 placeholder to claim the turboquant-cli name (one-time)'
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install build

      # ----- Path A: one-time placeholder (manual dispatch only) -----
      - name: Build placeholder (turboquant-cli 0.0.0)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.placeholder }}
        run: |
          set -euo pipefail
          STAGE="$RUNNER_TEMP/stage"
          mkdir -p "$STAGE/turboquant_cli"
          cd "$STAGE"
          cat > pyproject.toml <<'EOF'
          [build-system]
          requires = ["setuptools>=64"]
          build-backend = "setuptools.build_meta"

          [project]
          name = "turboquant-cli"
          version = "0.0.0"
          description = "Placeholder reservation for turboquant-cli; see https://github.com/tqcli/tqcli"
          readme = "README.md"
          requires-python = ">=3.10"
          license = { text = "Apache-2.0" }
          authors = [{ name = "tqcli" }]
          urls = { Homepage = "https://github.com/tqcli/tqcli" }
          EOF
          cat > README.md <<'EOF'
          # turboquant-cli (placeholder)

          Reserves the `turboquant-cli` PyPI name. The first real release will be 0.7.0.

          Licensed under the Apache License, Version 2.0.
          See https://github.com/tqcli/tqcli for the actual project.
          EOF
          cat > turboquant_cli/__init__.py <<'EOF'
          __version__ = "0.0.0"
          EOF
          python -m build
          mkdir -p "$GITHUB_WORKSPACE/dist"
          cp dist/* "$GITHUB_WORKSPACE/dist/"

      # ----- Path B: real release on tag push -----
      - name: Build real release from repo
        if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
        run: |
          set -euo pipefail
          python -m build
          ls -la dist/

      - name: Show wheel + sdist contents (sanity check)
        if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
        run: |
          for f in dist/*; do
            echo "=== $f ==="
            python -c "import tarfile, zipfile, sys; p=sys.argv[1]; \
              (zipfile.ZipFile(p).printdir() if p.endswith('.whl') else tarfile.open(p).list())" "$f"
          done

      - uses: pypa/gh-action-pypi-publish@release/v1
