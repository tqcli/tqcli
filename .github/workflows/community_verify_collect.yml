name: Community Verify — collect 0.7.0 reports

# Nightly scrape of the `community-verify-0.7.0` label. Each open or
# closed issue with that label is rendered to
# tests/integration_reports/community_verification/0.7.0/<issue-number>.md
# (anonymized — the GitHub username and avatar are NOT recorded; only the
# report markdown body and the issue's PASS/FAIL outcome survive). The job
# commits any new files via a PR so a maintainer signs off before the
# reports land on main.
#
# Manual trigger via workflow_dispatch is supported for one-off resyncs.

on:
  schedule:
    - cron: '17 7 * * *'   # nightly at 07:17 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scrape labeled issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          OUTDIR="tests/integration_reports/community_verification/0.7.0"
          mkdir -p "$OUTDIR"
          # List up to 100 issues with the verify label; both open + closed.
          gh issue list --repo "${GITHUB_REPOSITORY}" \
            --label "community-verify-0.7.0" \
            --state all \
            --limit 100 \
            --json number,title,body,createdAt,state \
            > /tmp/issues.json

          python3 - <<'PY'
          import json, os, pathlib
          issues = json.load(open("/tmp/issues.json"))
          out = pathlib.Path("tests/integration_reports/community_verification/0.7.0")
          out.mkdir(parents=True, exist_ok=True)
          for issue in issues:
              n = issue["number"]
              p = out / f"{n:04d}.md"
              # Skip overwrite if we already have it — keeps git diff small
              # and lets a maintainer hand-edit a file without it being
              # clobbered by the next nightly run.
              if p.exists():
                  continue
              header = (
                  f"# Community Verify Report #{n}\n\n"
                  f"- Issue: #{n}\n"
                  f"- Created: {issue['createdAt']}\n"
                  f"- State: {issue['state']}\n"
                  f"- Title: {issue['title']}\n\n"
                  "---\n\n"
              )
              p.write_text(header + (issue.get("body") or "(empty body)"))
          PY

      - name: Open PR if anything changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "community-verify: nightly intake (0.7.0)"
          title: "community-verify: nightly intake (0.7.0)"
          body: |
            Auto-generated by .github/workflows/community_verify_collect.yml.
            Review each new file under
            tests/integration_reports/community_verification/0.7.0/ before
            merging — the workflow does not gate content beyond the
            `community-verify-0.7.0` label filter.
          branch: community-verify/0.7.0/intake
          add-paths: tests/integration_reports/community_verification/0.7.0/*.md
          delete-branch: true
